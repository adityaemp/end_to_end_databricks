name: Sensor Streaming MLOps

concurrency:
  group: sensor-mlops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'end_to_end_databricks/**'
      - '.github/workflows/sensor-mlops.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'end_to_end_databricks/**'
      - '.github/workflows/sensor-mlops.yml'

env:
  DATABRICKS_HOST: https://dbc-314d456b-c68f.cloud.databricks.com
  DATABRICKS_TOKEN: ${{ secrets.STAGING_WORKSPACE_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r end_to_end_databricks/requirements.txt

      - name: Run unit tests
        run: |
          pytest -q end_to_end_databricks/tests

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: end_to_end_databricks
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.236.0

      - name: Validate and deploy bundle
        env:
          DATABRICKS_HOST: ${{ env.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail
          databricks bundle validate -t test
          databricks bundle deploy -t test
          databricks bundle validate -t staging
          databricks bundle deploy -t staging

      - name: Trigger sensor streaming job (staging)
        env:
          DATABRICKS_HOST: ${{ env.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail
          JOB_ID=$(databricks jobs list --output JSON | jq -r '.jobs[] | select(.settings.name=="staging-end_to_end_databricks-sensor-streaming-etl-job") | .job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Job staging-end_to_end_databricks-sensor-streaming-etl-job not found; skip run-now."
            exit 0
          fi
          databricks jobs run-now --job-id "$JOB_ID"
