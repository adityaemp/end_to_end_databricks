common_permissions: &permissions
  permissions:
    - level: CAN_VIEW
      group_name: users

resources:
  jobs:
    sensor_streaming_job:
      name: ${bundle.target}-end_to_end_databricks-sensor-streaming-etl-job
      tasks:
        - task_key: TriggerDLTPipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.sensor_streaming_dlt_pipeline.id}
            full_refresh: false
      schedule:
        quartz_cron_expression: "0 0/10 * * * ?" # every 10 minutes for continuous processing
        timezone_id: UTC
      <<: *permissions
