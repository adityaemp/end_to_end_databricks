common_permissions: &permissions
  permissions:
    - level: CAN_VIEW
      group_name: users

resources:
  pipelines:
    sensor_streaming_dlt_pipeline:
      name: ${bundle.target}-sensor-streaming-dlt-pipeline
      catalog: ${var.catalog_name}
      target_schema: ${var.schema_name}
      serverless: true
      libraries:
        - notebook:
            path: ../feature_engineering/notebooks/SensorStreamingDLT.py
      configuration:
        bundle.sourcePath: ${bundle.git.origin_url}
        bundle.sourceBranch: ${bundle.git.branch}
        bundle.sourceCommit: ${bundle.git.commit}
      continuous: true
      development: true
      channel: PREVIEW
      photon: true
      <<: *permissions