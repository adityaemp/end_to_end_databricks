# Lakehouse Monitoring: requires Unity Catalog tables (predictions) to exist in each catalog.
# See https://docs.databricks.com/aws/en/lakehouse-monitoring/

common_permissions: &permissions
  permissions:
    - level: CAN_VIEW
      group_name: users

resources:
  quality_monitors:
    end_to_end_databricks_quality_monitor:
      table_name: ${var.catalog_name}.end_to_end_databricks.predictions
      output_schema_name: ${var.catalog_name}.end_to_end_databricks
      # TODO: Update the below parameters as per your requirements
      assets_dir: /Users/${workspace.current_user.userName}/databricks_lakehouse_monitoring
      inference_log:
        granularities: [1 day]
        # Must match columns written by deployment/batch_inference/predict.py and the training label.
        model_id_col: model_id
        prediction_col: prediction
        label_col: fare_amount
        problem_type: PROBLEM_TYPE_REGRESSION
        timestamp_col: timestamp
      schedule:
        quartz_cron_expression: 0 0 8 * * ? # Run Every day at 8am
        timezone_id: UTC
  jobs:
    retraining_job:
      name: ${bundle.target}-end_to_end_databricks-monitoring-retraining-job
      tasks:
        - task_key: monitored_metric_violation_check
          notebook_task:
            notebook_path: ../monitoring/notebooks/MonitoredMetricViolationCheck.py
            base_parameters:
              env: ${bundle.target}
              table_name_under_monitor: ${var.catalog_name}.end_to_end_databricks.predictions
              # TODO: Update the metric to be monitored and violation threshold
              metric_to_monitor: root_mean_squared_error
              metric_violation_threshold: 100
              num_evaluation_windows: 5
              num_violation_windows: 2

        - task_key: is_metric_violated
          depends_on:
            - task_key: monitored_metric_violation_check
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.monitored_metric_violation_check.values.is_metric_violated}}"
            right: "true"

        - task_key: trigger_retraining
          depends_on:
            - task_key: is_metric_violated
              outcome: "true"
          run_job_task:
            job_id: ${resources.jobs.model_training_job.id}

      schedule:
        quartz_cron_expression: "0 0 18 * * ?" # daily at 6pm
        timezone_id: UTC
      <<: *permissions
      # If you want to turn on notifications for this job, please uncomment the below code,
      # and provide a list of emails to the on_failure argument.
      #
      #  email_notifications:
      #    on_failure:
      #      - first@company.com
      #      - second@company.com

