# The name of the bundle. run `databricks bundle schema` to see the full bundle settings schema.
bundle:
  # Do not modify the below line, this autogenerated field is used by the Databricks backend.
  uuid: e85a06d4-4f3e-46f2-acd0-ff427be63b48
  name: end_to_end_databricks

variables:
  experiment_name:
    description: Experiment name for the model training.
    default: /Users/${workspace.current_user.userName}/${bundle.target}-end_to_end_databricks-experiment
  model_name:
    description: Model name for the model training.
    default: end_to_end_databricks-model
  catalog_name:
    description: The catalog name to save the trained model
  schema_name:
    description: The schema name for all tables
    default: end_to_end_databricks
  dlt_development:
    description: DLT development mode (use false for staging/prod — isolated reset behavior is dev-only).
    default: false
  dlt_channel:
    description: Delta Live Tables channel (CURRENT for production stability).
    default: CURRENT

include:
  # Resources folder contains ML artifact resources for the ML project that defines model and experiment
  # And workflows resources for the ML project including model training -> validation -> deployment,
  # feature engineering,  batch inference, quality monitoring, metric refresh, alerts and triggering retraining
  - ./resources/batch-inference-workflow-resource.yml
  - ./resources/ml-artifacts-resource.yml
  - ./resources/model-workflow-resource.yml
  - ./resources/feature-engineering-workflow-resource.yml
  - ./resources/sensor-streaming-workflow-resource.yml
  - ./resources/dlt-sensor-streaming-pipeline.yml
  - ./resources/monitoring-resource.yml
  # Optional: uncomment after predictions table has columns model_id, prediction, fare_amount, timestamp
  # (see sql/create_predictions_tables.sql). Otherwise terraform may fail creating the monitor.
  # - ./resources/monitoring-quality-monitor-resource.yml

# Deployment Target specific values for workspace
targets:
  dev:  # UC Catalog Name 
    mode: development
    default: true
    variables:
      catalog_name: dev
      dlt_development: true
      dlt_channel: PREVIEW
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-314d456b-c68f.cloud.databricks.com

  staging:
    variables:
      catalog_name: staging
    presets:
      name_prefix: staging_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-314d456b-c68f.cloud.databricks.com

  prod:
    variables:
      catalog_name: prod
    presets:
      name_prefix: prod_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-314d456b-c68f.cloud.databricks.com
    permissions:
      - group_name: admins
        level: can_manage

  test:
    variables:
      catalog_name: test
    presets:
      name_prefix: test_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-314d456b-c68f.cloud.databricks.com
